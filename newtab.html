<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouvel Onglet</title>
    <link rel="stylesheet" href="newtab.css">
</head>
<body>
    <main class="shell">
        <section class="clock-section" aria-label="Horloge">
            <p class="clock-label">Aujourd'hui</p>
            <h1 id="time" class="clock-time">00:00</h1>
            <p id="dateText" class="clock-date"></p>

            <div class="clock-settings" id="clockSettings" hidden>
                <div class="settings-grid">
                    <label>
                        Police
                        <select id="clockFont">
                            <option value="default">Systeme</option>
                            <option value="rounded">Arrondie</option>
                            <option value="serif">Serif</option>
                        </select>
                    </label>
                    <label>
                        Couleur
                        <input id="clockColor" type="color" value="#ffffff">
                    </label>
                    <label>
                        Epaisseur
                        <input id="clockWeight" type="range" min="300" max="800" step="100" value="500">
                    </label>
                     <label class="toggle-field">
                         <span>Noir et blanc</span>
                         <input id="shortcutIconsMonochrome" class="toggle" type="checkbox" role="switch">
                     </label>
                     <label class="toggle-field">
                         <span>Afficher les noms</span>
                         <input id="showShortcutNames" class="toggle" type="checkbox" role="switch" checked>
                     </label>
                 </div>
            </div>
        </section>

        <section class="shortcuts-section glass" aria-label="Raccourcis">
            <div class="section-topbar">
                <h2 class="sr-only">Raccourcis</h2>
                <div class="actions">
                    <button id="addListBtn" class="btn subtle" type="button" hidden>Ajouter une liste</button>
                </div>
            </div>

            <div id="listsContainer" class="lists-container" aria-live="polite"></div>
        </section>
    </main>

    <dialog id="shortcutsModal" class="shortcuts-modal">
        <div class="shortcuts-toolbar">
            <div class="shortcuts-search-wrap">
                <input id="shortcutsSearchInput" type="search" placeholder="Rechercher un raccourci..." aria-label="Rechercher un raccourci">
            </div>
            <button id="closeModalBtn" class="btn subtle" type="button">Fermer</button>
        </div>
        <div id="shortcutsGrid" class="shortcuts-grid"></div>
    </dialog>

    <dialog id="shortcutEditorModal" class="shortcut-editor-modal">
        <form id="shortcutForm" class="shortcut-form">
            <div class="modal-header">
                <h3 id="shortcutFormTitle">Ajouter un raccourci</h3>
            </div>

            <input id="shortcutId" type="hidden">

            <label class="field">
                Nom
                <input id="shortcutName" type="text" maxlength="30" required placeholder="Ex: GitHub">
            </label>

            <label class="field">
                URL
                <input id="shortcutUrl" type="text" required placeholder="Ex: github.com">
            </label>


            <label class="field">
                Image personnalisee (URL)
                <input id="shortcutImageUrl" type="text" placeholder="Ex: https://site.com/icon.png">
            </label>


            <div class="shortcut-form-actions">
                <button id="shortcutCancelBtn" class="btn subtle" type="button">Annuler</button>
                <button class="btn" type="submit">Enregistrer</button>
            </div>
        </form>
    </dialog>

    <dialog id="shortcutDeleteModal" class="shortcut-editor-modal delete-modal">
        <div class="modal-header">
            <h3>Supprimer le raccourci</h3>
        </div>
        <p class="delete-modal-text">Supprimer <strong id="deleteShortcutName"></strong> ?</p>
        <div class="shortcut-form-actions">
            <button id="deleteCancelBtn" class="btn subtle" type="button">Annuler</button>
            <button id="deleteConfirmBtn" class="btn" type="button">Supprimer</button>
        </div>
    </dialog>

    <script src="newtab.js"></script>
</body>
</html>
